name: kipera
description: "Kipera - Savings Habits App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  supabase_flutter: ^2.8.4
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.1
  google_sign_in: ^6.2.2
  flutter_animate: ^4.5.2
  simple_animations: ^5.0.2
  path_provider: ^2.1.5
  path: ^1.9.1
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.2.1
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  home_widget: ^0.7.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/fonts/

  fonts:
    - family: ClashDisplay
      fonts:
        - asset: assets/fonts/ClashDisplay/ClashDisplay-Light.ttf
          weight: 300
        - asset: assets/fonts/ClashDisplay/ClashDisplay-Regular.ttf
          weight: 400
        - asset: assets/fonts/ClashDisplay/ClashDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/ClashDisplay/ClashDisplay-Semibold.ttf
          weight: 600
        - asset: assets/fonts/ClashDisplay/ClashDisplay-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
